<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Engineering</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* --- ΚΕΝΤΡΟ ΕΛΕΓΧΟΥ (ΟΙ ΡΥΘΜΙΣΕΙΣ ΣΟΥ) --- */
            --bg-color: #111111;
            --logo-width: 1200px;        
            --logo-vertical-shift: -150px; 
            --text-top-margin: -250px;    
            --text-spacing: 15px;        

            /* --- ΧΡΟΝΟΙ ANIMATION --- */
            --logo-ani-duration: 2s;   
            --logo-ani-delay: 0.5s;      
            --text-ani-duration: 1s;   
            --text-ani-delay: 1.2s;      
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transform: translateY(var(--logo-vertical-shift));
        }

        .logo-box {
            width: var(--logo-width);
            max-width: 95vw;
            filter: blur(25px) brightness(0);
            transform: scale(1.05);
            animation: logoReveal var(--logo-ani-duration) forwards var(--logo-ani-delay) cubic-bezier(0.4, 0, 0.2, 1);
        }

        img {
            width: 100%;
            height: auto;
            display: block;
        }

        h1 {
            color: white;
            font-weight: 300;
            font-size: clamp(1rem, 2vw, 1.3rem);
            letter-spacing: var(--text-spacing);
            text-transform: uppercase;
            margin: 0;
            margin-top: var(--text-top-margin); 
            opacity: 0;
            animation: textFadeIn var(--text-ani-duration) forwards var(--text-ani-delay) ease-out;
            white-space: nowrap;
        }

        /* --- ΣΤΟΙΧΕΙΑ ΕΠΙΚΟΙΝΩΝΙΑΣ (ΚΑΤΩ ΑΡΙΣΤΕΡΑ) --- */
        .contact-info {
            position: absolute;
            bottom: 40px;
            left: 40px;
            color: #ffffff; /* Καθαρό λευκό στα στατικά κείμενα */
            font-weight: 300;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            opacity: 0;
            animation: textFadeIn 1s forwards var(--text-ani-delay);
            z-index: 10;
        }

        .contact-item {
            padding-bottom: 10px; /* Το padding που ζήτησες */
            display: block;
        }

        .contact-info a {
            color: #ffffff;
            text-decoration: none;
            opacity: 0.8; /* Ελαφρώς πιο αχνό για να μην "χτυπάει", αλλά γίνεται 100% στο hover */
            transition: all 0.3s ease;
        }

        .contact-info a:hover {
            opacity: 1;
            color: #ff6600; /* Πορτοκαλί Axiom στο hover */
        }

        /* --- ANIMATIONS --- */

        @keyframes logoReveal {
            to { 
                filter: blur(0) brightness(1);
                transform: scale(1);
            }
        }

        @keyframes textFadeIn {
            from { 
                opacity: 0; 
                transform: translateY(10px);
            }
            to { 
                opacity: 0.8; 
                transform: translateY(0);
            }
        }

        /* Mobile Fixes */
        @media (max-width: 768px) {
            :root { 
                --logo-width: 90vw;
                --logo-vertical-shift: -30px;
                --text-top-margin: 15px; 
                --text-spacing: 6px;
            }
            .contact-info {
                bottom: 20px;
                left: 20px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="logo.png" alt="Axiom Logo">
        </div>
        <h1>UNDER CONSTRUCTION</h1>
    </div>

    <div class="contact-info">
        <span class="contact-item">T: <a href="tel:+306987591751">+30 698 759 1751</a></span>
        <span class="contact-item">E: <a href="mailto:info@axiomeng.gr">info@axiomeng.gr</a></span>
        <span class="contact-item">Zakynthos, Greece</span>
    </div>

</body>
</html>
